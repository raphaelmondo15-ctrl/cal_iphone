<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div class="container">
        <div class="cal">
        <p id="output"></p>
        <input type="text" id="inputtext" placeholder="0">
        <button onclick="clr()">C</button>
        <button onclick="deleteLast()">AC</button>
        <button onclick="appendValue('%')">%</button>
        <button  class="signe" onclick="appendValue('/')">/</button>
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button  class="signe" onclick="appendValue('*')">x</button>
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button  class="signe" onclick="appendValue('-')">-</button>
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button  class="signe" onclick="appendValue('+')">+</button>
        <button  class="button-zero" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button  class="result" onclick="Result()">=</button>
        <script src="https://cdn.jsdelivr.net/npm/mathjs@11/lib/browser/math.js"></script>
        <script src="cal.js"></script>
    </div>
    </div>
    
</body>
</html>
